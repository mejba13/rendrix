services:
  # ============================================
  # Application Services
  # ============================================

  # Fastify API Server
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: rendrix-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rendrix?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-in-production}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_S3_BUCKET: rendrix-media
      AWS_ENDPOINT: http://minio:9000
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_KEY: ${MEILISEARCH_KEY:-rendrix-dev-master-key}
    volumes:
      # Bind mount source code for hot reload
      - ./apps/api/src:/app/apps/api/src:cached
      - ./packages/database/src:/app/packages/database/src:cached
      - ./packages/database/prisma:/app/packages/database/prisma:cached
      - ./packages/types/src:/app/packages/types/src:cached
      - ./packages/utils/src:/app/packages/utils/src:cached
      # Anonymous volumes to prevent overwriting node_modules
      - /app/node_modules
      - /app/apps/api/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Next.js Web Dashboard
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: rendrix-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      WATCHPACK_POLLING: "true"
    volumes:
      # Bind mount source code for hot reload
      - ./apps/web/src:/app/apps/web/src:cached
      - ./apps/web/public:/app/apps/web/public:cached
      - ./packages/types/src:/app/packages/types/src:cached
      - ./packages/utils/src:/app/packages/utils/src:cached
      # Anonymous volumes to prevent overwriting node_modules and .next
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Next.js Customer Storefront
  storefront:
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
      target: development
    container_name: rendrix-storefront
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      WATCHPACK_POLLING: "true"
    volumes:
      # Bind mount source code for hot reload
      - ./apps/storefront/src:/app/apps/storefront/src:cached
      - ./apps/storefront/public:/app/apps/storefront/public:cached
      - ./packages/types/src:/app/packages/types/src:cached
      - ./packages/utils/src:/app/packages/utils/src:cached
      # Anonymous volumes to prevent overwriting node_modules and .next
      - /app/node_modules
      - /app/apps/storefront/node_modules
      - /app/apps/storefront/.next
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ============================================
  # Infrastructure Services
  # ============================================

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: rendrix-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rendrix
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: rendrix-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Meilisearch (Product Search)
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: rendrix-meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: rendrix-dev-master-key
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO (S3-compatible storage for local development)
  minio:
    image: minio/minio:latest
    container_name: rendrix-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Mailhog (Email testing)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: rendrix-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:

networks:
  default:
    name: rendrix-network
